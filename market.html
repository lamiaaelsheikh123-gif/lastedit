<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Phoenix · Market</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <style>
    /* ========== EXISTING STYLES (unchanged) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg: #f9fafc;
      --surface: #ffffff;
      --text-primary: #1e1e2f;
      --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c;
      --accent-2: #ff6b2b;
      --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --card-bg: #ffffff;
      --border: #eaeef2;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.05);
      --glow: rgba(255, 110, 64, 0.4);
      --navbar-bg: rgba(255, 255, 255, 0.8);
      --footer-bg: #1e1e2f;
      --footer-text: #f0f0fa;
      --special-gradient: linear-gradient(145deg, #000000, #ff6b2b, #ff8a4c, #ff4d4d);
    }

    body.dark {
      --bg: #12121a;
      --surface: #1e1e2a;
      --text-primary: #f0f0fa;
      --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e;
      --accent-2: #ff7b3f;
      --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --card-bg: #252533;
      --border: #333344;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
      --glow: rgba(255, 140, 80, 0.6);
      --navbar-bg: rgba(30, 30, 42, 0.9);
      --footer-bg: #0b0b12;
      --footer-text: #ddddff;
      --special-gradient: linear-gradient(145deg, #111111, #ff7b3f, #ff9f6e, #ff5e5e);
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      transition: 0.3s;
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .logo-area img {
      height: 40px;
      width: auto;
      border-radius: 8px;
    }

    .logo-text h2 {
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: block;
    }

    .nav-links {
      display: none;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1rem;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-1);
    }

    .nav-links .app-link {
      font-weight: 700;
      color: var(--accent-1);
      text-shadow: 0 0 5px var(--glow);
    }

    .app-link-mobile {
      font-weight: 700;
      color: var(--accent-1);
      font-size: 0.9rem;
      margin-left: auto;
      margin-right: 0.5rem;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      position: relative;
    }

    .nav-icon {
      font-size: 1.2rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-icon:hover {
      color: var(--accent-1);
      transform: scale(1.05);
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .profile-badge i {
      font-size: 1.2rem;
    }

    .profile-badge:hover {
      background: var(--accent-1);
      color: white;
    }

    /* زر تسجيل الخروج */
    .logout-btn {
      background: transparent;
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: var(--accent-1);
      color: white;
      box-shadow: 0 0 15px var(--glow);
    }

    .hamburger {
      display: block;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      margin-left: 0.5rem;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 250px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1rem;
      transition: left 0.3s ease;
      z-index: 200;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar .close-btn {
      text-align: right;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 1.2rem;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1.1rem;
      display: block;
      padding: 0.5rem 0;
    }

    .sidebar a:hover {
      color: var(--accent-1);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* ===== محتوى صفحة Market ===== */
    .page-header {
      margin: 2rem 0 1rem;
      text-align: center;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: var(--special-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .page-header p {
      color: var(--text-secondary);
    }

    /* Search bar */
    .search-bar {
      max-width: 600px;
      margin: 1.5rem auto 2rem;
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 0.3rem 0.3rem 0.3rem 1.5rem;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.8rem 0;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
    }

    .search-bar button {
      background: var(--gradient);
      border: none;
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px var(--glow);
    }

    .search-bar button:hover {
      transform: scale(1.02);
    }

    /* شريط الفلاتر الموحد */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      background: var(--surface);
      padding: 1.2rem 1.5rem;
      border-radius: 60px;
      margin: 1.5rem 0 2rem;
      border: 1px solid var(--border);
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-group label {
      font-weight: 600;
      color: var(--accent-1);
      white-space: nowrap;
    }

    .filter-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 30px;
      color: var(--text-primary);
    }

    /* رسالة عدم وجود نتائج */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* شبكة المنتجات */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin: 2rem 0;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid var(--border);
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-1);
    }

    .product-img {
      width: 100%;
      height: 120px;
      border-radius: 14px;
      margin-bottom: 0.8rem;
      overflow: hidden;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .product-user {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 0.3rem 0;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }

    .product-value {
      font-weight: 700;
      color: var(--accent-2);
      font-size: 1rem;
    }

    .trade-btn {
      background: var(--gradient);
      border: none;
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--glow);
      pointer-events: none;
      /* حتى لا يتعارض مع النقر على البطاقة */
    }

    /* زر تحميل المزيد */
    .load-more {
      text-align: center;
      margin: 3rem 0;
    }

    .load-more button {
      background: transparent;
      border: 2px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.8rem 3rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .load-more button:hover {
      background: var(--accent-1);
      color: white;
      box-shadow: 0 0 18px var(--glow);
    }

    /* ========== NOTIFICATION DROPDOWN STYLES ========== */
    .notification-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent-1);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 50px;
      min-width: 18px;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      z-index: 5;
    }

    .notification-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 360px;
      max-width: 90vw;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .notification-dropdown.show {
      display: flex;
    }

    .dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .mark-read-btn {
      background: none;
      border: none;
      color: var(--accent-1);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .mark-read-btn:hover {
      text-decoration: underline;
    }

    .notifications-list {
      max-height: 400px;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .notification-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .notification-item:hover {
      background: var(--bg);
    }

    .notification-icon {
      font-size: 1.2rem;
      min-width: 32px;
      text-align: center;
      color: var(--accent-1);
    }

    .notification-content {
      flex: 1;
    }

    .notification-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }

    .notification-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.2rem;
    }

    .notification-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .unread-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-1);
      border-radius: 50%;
      position: absolute;
      right: 1rem;
      top: 1.2rem;
    }

    .dropdown-footer {
      padding: 0.8rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .dropdown-footer a {
      color: var(--accent-1);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .dropdown-footer a:hover {
      text-decoration: underline;
    }

    /* ===== MESSAGE DROPDOWN STYLES ===== */
    .message-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .message-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent-1);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 50px;
      min-width: 18px;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      z-index: 5;
    }

    .message-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 360px;
      max-width: 90vw;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .message-dropdown.show {
      display: flex;
    }

    .message-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .message-item:hover {
      background: var(--bg);
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--accent-1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message-content {
      flex: 1;
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }

    .message-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }

    .message-unread-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-1);
      border-radius: 50%;
      position: absolute;
      right: 1rem;
      top: 1.2rem;
    }

    /* ===== AI Chatbot ===== */
    .chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chat-label {
      background: var(--surface);
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      cursor: default;
      text-decoration: underline 1px dotted var(--accent-1);
      text-underline-offset: 3px;
      transition: 0.2s;
    }

    .chat-label:hover {
      background: var(--accent-1);
      color: white;
      text-decoration: none;
    }

    .chat-circle {
      background: var(--gradient);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 8px 20px var(--glow);
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-circle:hover {
      transform: scale(1.1);
    }

    .chat-box {
      position: absolute;
      bottom: 70px;
      right: 0;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.2rem;
      display: none;
      box-shadow: var(--shadow);
    }

    .chat-box.show {
      display: block;
    }

    .chat-messages {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .chat-message {
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }

    .chat-message.bot {
      background: var(--accent-1);
      color: white;
    }

    .chat-box textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.7rem;
      color: var(--text-primary);
      resize: none;
      font-size: 0.9rem;
    }

    .chat-box button {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
    }

    /* ===== SIMPLE FOOTER ===== */
    .simple-footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      margin-top: 3rem;
      border-top: 1px solid var(--border);
    }

    .simple-footer a {
      color: var(--footer-text);
      text-decoration: none;
      margin: 0 0.3rem;
      transition: 0.2s;
    }

    .simple-footer a:hover {
      color: var(--accent-1);
    }

    .simple-footer span {
      margin: 0 0.3rem;
    }

    @media (min-width: 768px) {
      .container {
        padding: 0 2rem;
      }

      nav {
        padding: 0.8rem 2rem;
      }

      .logo-area img {
        height: 52px;
      }

      .logo-text h2 {
        font-size: 1.5rem;
      }

      .logo-text span {
        font-size: 0.8rem;
      }

      .nav-links {
        display: flex;
      }

      .app-link-mobile {
        display: none;
      }

      .hamburger {
        display: none;
      }

      .sidebar,
      .overlay {
        display: none;
      }

      .page-header h1 {
        font-size: 2.8rem;
      }

      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 2rem;
      }
    }

    /* Responsive for dropdowns on mobile */
    @media (max-width: 480px) {

      .notification-dropdown,
      .message-dropdown {
        right: -10px;
        width: calc(100vw - 20px);
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="logo-area">
      <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
      <div class="logo-text">
        <h2>Phoenix</h2>
        <span>donate & trade</span>
      </div>
    </div>
    <a href="#app" class="app-link-mobile">App</a>
    <div class="nav-links">
      <a href="dashboard.html">Home</a>
      <a href="market.html" class="market-link">Market</a>
      <a href="donate.html">Donate</a>
      <a href="sell.html">Sell</a>
      <a href="#app" class="app-link">App</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <!-- Notification Bell with wrapper and badge -->
      <div class="notification-wrapper">
        <i class="fas fa-bell nav-icon" id="notificationBell"></i>
        <span class="notification-badge" id="notificationBadge">3</span>
      </div>
      <!-- Message Icon with wrapper and badge -->
      <div class="message-wrapper">
        <i class="fas fa-comment-dots nav-icon" id="messageIcon"></i>
        <span class="message-badge" id="messageBadge">2</span>
      </div>
      <a href="profile.html" class="profile-badge">
        <i class="fas fa-user"></i>
      </a>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <span class="hamburger" id="hamburger">☰</span>
    </div>
  </nav>

  <div class="sidebar" id="sidebar">
    <div class="close-btn" id="closeSidebar">✕</div>
    <ul>
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="market.html">Market</a></li>
      <li><a href="donate.html">Donate</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="#app">App</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" id="logoutSidebar">Logout</a></li>

  <main class="container">
    <div class="page-header">
      <h1>Marketplace</h1>
      <p>Discover items donated or sold by the community.</p>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search for products...">
      <button id="searchBtn">Search</button>
    </div>

    <!-- شريط الفلاتر الموحد (Category, Condition, Price, Type) -->
    <div class="filter-bar">
      <div class="filter-group">
        <label><i class="fas fa-tag"></i> Category</label>
        <select id="categorySelect">
          <option value="all">All</option>
          <option value="electronics">Electronics</option>
          <option value="fashion">Fashion</option>
          <option value="home">Home</option>
          <option value="sports">Sports</option>
          <option value="books">Books</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-check-circle"></i> Condition</label>
        <select id="conditionSelect">
          <option value="all">All</option>
          <option value="new">New</option>
          <option value="like-new">Like New</option>
          <option value="good">Good</option>
          <option value="fair">Fair</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-dollar-sign"></i> Price</label>
        <select id="priceSelect">
          <option value="all">All</option>
          <option value="under50">Under $50</option>
          <option value="50-200">$50 - $200</option>
          <option value="200-500">$200 - $500</option>
          <option value="500plus">$500+</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-heart"></i> Type</label>
        <select id="typeSelect">
          <option value="all">All</option>
          <option value="donation">Free Items</option>
          <option value="sale">For Sale</option>
        </select>
      </div>
    </div>

    <!-- شبكة المنتجات -->
    <div class="product-grid" id="productGrid">
      <!-- تملأ بواسطة JavaScript -->
    </div>

    <!-- زر تحميل المزيد -->
    <div class="load-more">
      <button id="loadMoreBtn">Load More Products</button>
    </div>
    <div id="app" style="scroll-margin-top:70px;"></div>
  </main>

  <!-- Simple Footer -->
  <footer class="simple-footer">
    <div>
      © 2025 Phoenix •
      <a href="#">About</a> •
      <a href="#">Terms</a> •
      <a href="#">Privacy</a>
    </div>
  </footer>

  <!-- AI Chatbot -->
  <div class="chatbot">
    <span class="chat-label">Ask AI</span>
    <div class="chat-circle" id="chatIcon"><i class="fas fa-robot"></i></div>
    <div class="chat-box" id="chatBox">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message bot">👋 Hi! How can I help you today?</div>
      </div>
      <textarea id="chatInput" placeholder="Type your message..." rows="2"></textarea>
      <button id="sendChat">Send</button>
    </div>
  </div>

  <script>
    // ========== EXISTING MARKETPLACE SCRIPT (unchanged) ==========
    const products = [
      { id: 1, title: 'MacBook Pro 16" M3 Max', category: 'electronics', condition: 'new', price: 2499, type: 'sale', user: 'Alex M.', views: 234, likes: 18, img: 'macbook.jpeg' },
      { id: 2, title: 'Sony WH-1000XM5', category: 'electronics', condition: 'like-new', price: 299, type: 'sale', user: 'Chris P.', views: 156, likes: 12, img: 'Sony.jpeg' },
      { id: 3, title: 'Canon EOS R6 II', category: 'electronics', condition: 'good', price: 2199, type: 'sale', user: 'Emma R.', views: 189, likes: 24, img: 'Camera.png' },
      { id: 4, title: 'Winter Coat', category: 'fashion', condition: 'like-new', price: 0, type: 'donation', user: 'Free', views: 45, likes: 5, img: 'Coat.jpeg' },
      { id: 5, title: 'Kids\' Bicycle', category: 'sports', condition: 'fair', price: 0, type: 'donation', user: 'Free', views: 32, likes: 3, img: 'Bicycle.png' },
      { id: 6, title: 'iPhone 15 Pro Max', category: 'electronics', condition: 'new', price: 1199, type: 'sale', user: 'Sophia W.', views: 301, likes: 42, img: 'iphone.png' },
      { id: 7, title: 'Gaming Chair', category: 'home', condition: 'like-new', price: 130, type: 'sale', user: 'For sale', views: 102, likes: 14, img: 'Chair.png' },
      { id: 8, title: 'Leather Sofa', category: 'home', condition: 'fair', price: 220, type: 'sale', user: 'Mia T.', views: 78, likes: 9, img: 'Sofa.png' },
      { id: 9, title: 'Vintage Camera', category: 'electronics', condition: 'good', price: 210, type: 'sale', user: 'Alex', views: 34, likes: 12, img: 'Old Camera.png' },
      { id: 10, title: 'Yoga Mat', category: 'sports', condition: 'like-new', price: 25, type: 'sale', user: 'Sam', views: 22, likes: 8, img: 'Yoga.png' },
      { id: 11, title: 'Children Book Set', category: 'books', condition: 'good', price: 0, type: 'donation', user: 'Free', views: 15, likes: 4, img: 'Books.png' },
    ];

    const productGrid = document.getElementById('productGrid');
    const categorySelect = document.getElementById('categorySelect');
    const conditionSelect = document.getElementById('conditionSelect');
    const priceSelect = document.getElementById('priceSelect');
    const typeSelect = document.getElementById('typeSelect');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    let filters = { category: 'all', condition: 'all', price: 'all', type: 'all', search: '' };
    let visibleCount = 8;

    function renderProducts() {
      let filtered = products.filter(p => {
        if (filters.category !== 'all' && p.category !== filters.category) return false;
        if (filters.condition !== 'all' && p.condition !== filters.condition) return false;
        if (filters.type !== 'all' && p.type !== filters.type) return false;
        if (filters.price !== 'all') {
          if (filters.price === 'under50' && p.price >= 50) return false;
          if (filters.price === '50-200' && (p.price < 50 || p.price > 200)) return false;
          if (filters.price === '200-500' && (p.price < 200 || p.price > 500)) return false;
          if (filters.price === '500plus' && p.price <= 500) return false;
        }
        if (filters.search && !p.title.toLowerCase().includes(filters.search.toLowerCase())) return false;
        return true;
      });

      const toShow = filtered.slice(0, visibleCount);
      if (toShow.length === 0) {
        productGrid.innerHTML = `<div class="no-results">No items found matching your criteria.</div>`;
        return;
      }

      productGrid.innerHTML = toShow.map(p => `
                <div class="product-card" data-id="${p.id}">
                    ${p.price === 0 ? '<span class="badge" style="position:absolute; top:0.5rem; left:0.5rem; background:var(--accent-1); color:white; padding:0.2rem 0.6rem; border-radius:30px; font-size:0.7rem;">Free</span>' : ''}
                    <div class="product-img">
                        ${p.img ? `<img src="${p.img}" alt="${p.title}">` : '<i class="fas fa-image" style="font-size:2rem; color:#b95b1d;"></i>'}
                    </div>
                    <div class="product-title">${p.title}</div>
                    <div class="product-user">${p.user} · ${p.price === 0 ? 'Free' : '$' + p.price}</div>
                    <div class="product-footer">
                        <span class="product-value">${p.price === 0 ? 'Free' : '$' + p.price}</span>
                        <button class="trade-btn">View</button>
                    </div>
                </div>
            `).join('');

      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', function () {
          const id = this.dataset.id;
          window.location.href = `product.html?id=${id}`;
        });
      });
    }

    categorySelect.addEventListener('change', () => {
      filters.category = categorySelect.value;
      renderProducts();
    });
    conditionSelect.addEventListener('change', () => {
      filters.condition = conditionSelect.value;
      renderProducts();
    });
    priceSelect.addEventListener('change', () => {
      filters.price = priceSelect.value;
      renderProducts();
    });
    typeSelect.addEventListener('change', () => {
      filters.type = typeSelect.value;
      renderProducts();
    });

    function performSearch() {
      filters.search = searchInput.value.trim();
      renderProducts();
    }
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      visibleCount += 4;
      renderProducts();
    });

    renderProducts();

    // الوضع الداكن
    const toggle = document.getElementById('themeToggle');
    const icon = toggle.querySelector('i');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      icon.classList.toggle('fa-sun');
      icon.classList.toggle('fa-moon');
    });

    // القائمة الجانبية
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeSidebar');

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    hamburger.addEventListener('click', openSidebar);
    closeBtn.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        if (targetId && targetId !== '#') {
          const targetEl = document.querySelector(targetId);
          if (targetEl) {
            const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 70;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }
        }
        closeSidebar();
      });
    });

    function handleLogout() {
      const confirmLogout = confirm('Are you sure you want to logout?');
      if (confirmLogout) {
        window.location.href = 'index.html';
      }
    }
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('logoutSidebar').addEventListener('click', (e) => {
      e.preventDefault();
      handleLogout();
    });

    // ========== NOTIFICATION DROPDOWN SCRIPT ==========
    (function () {
      const bell = document.getElementById('notificationBell');
      const badge = document.getElementById('notificationBadge');
      if (!bell) return;

      let notifications = [
        { id: 1, type: 'message', title: 'New message', description: 'Ahmed sent you a message about MacBook', time: '2 min ago', unread: true },
        { id: 2, type: 'donation', title: 'Donation request', description: 'Someone wants your winter coat', time: '1 hour ago', unread: true },
        { id: 3, type: 'system', title: 'Price update', description: 'Your listing price was changed', time: '3 hours ago', unread: true },
        { id: 4, type: 'message', title: 'New offer', description: 'Received an offer for iPhone', time: 'yesterday', unread: false }
      ];

      function getIconClass(type) {
        switch (type) {
          case 'message': return 'fa-envelope';
          case 'donation': return 'fa-heart';
          case 'system': return 'fa-exclamation-triangle';
          default: return 'fa-bell';
        }
      }

      const dropdown = document.createElement('div');
      dropdown.className = 'notification-dropdown';
      dropdown.innerHTML = `
        <div class="dropdown-header">
          <h3>Notifications</h3>
          <button class="mark-read-btn" id="markAllRead">Mark all as read</button>
        </div>
        <div class="notifications-list" id="notificationsList"></div>
        <div class="dropdown-footer">
          <a href="notifications.html" id="viewAllNotifications">View all notifications</a>
        </div>
      `;
      document.body.appendChild(dropdown);

      function renderNotifications() {
        const listContainer = document.getElementById('notificationsList');
        if (!listContainer) return;
        const unreadCount = notifications.filter(n => n.unread).length;
        badge.textContent = unreadCount > 0 ? unreadCount : '';
        badge.style.display = unreadCount > 0 ? 'block' : 'none';
        if (notifications.length === 0) {
          listContainer.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-secondary);">No notifications</div>`;
          return;
        }
        listContainer.innerHTML = notifications.map(notif => `
          <div class="notification-item" data-id="${notif.id}">
            <div class="notification-icon"><i class="fas ${getIconClass(notif.type)}"></i></div>
            <div class="notification-content">
              <div class="notification-title">${notif.title}</div>
              <div class="notification-desc">${notif.description}</div>
              <div class="notification-time">${notif.time}</div>
            </div>
            ${notif.unread ? '<span class="unread-dot"></span>' : ''}
          </div>
        `).join('');
        document.querySelectorAll('.notification-item').forEach(item => {
          item.addEventListener('click', function (e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const notif = notifications.find(n => n.id === id);
            if (notif && notif.unread) {
              notif.unread = false;
              renderNotifications();
            }
            console.log('Notification clicked', notif);
          });
        });
      }

      function markAllAsRead() { notifications.forEach(n => n.unread = false); renderNotifications(); }
      function toggleDropdown(e) { e.stopPropagation(); const rect = bell.getBoundingClientRect(); dropdown.style.top = (rect.bottom + window.scrollY + 5) + 'px'; dropdown.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px'; dropdown.classList.toggle('show'); }
      function closeDropdown(e) { if (!dropdown.contains(e.target) && e.target !== bell && !bell.contains(e.target)) dropdown.classList.remove('show'); }
      bell.addEventListener('click', toggleDropdown);
      document.addEventListener('click', closeDropdown);
      document.getElementById('markAllRead')?.addEventListener('click', markAllAsRead);
      renderNotifications();
    })();

    // ========== MESSAGE DROPDOWN SCRIPT ==========
    (function () {
      const messageIcon = document.getElementById('messageIcon');
      const messageBadge = document.getElementById('messageBadge');
      if (!messageIcon) return;

      // Sample conversations data
      let conversations = [
        { id: 1, sender: 'Ahmed Hassan', avatar: 'https://i.pravatar.cc/40?img=7', preview: 'Hey, is the MacBook still available?', time: '2 min ago', unread: true },
        { id: 2, sender: 'Lamiaa Elsheikh', avatar: 'https://i.pravatar.cc/40?img=5', preview: 'Thanks for the donation!', time: '1 hour ago', unread: true },
        { id: 3, sender: 'Mohamed Ali', avatar: 'https://i.pravatar.cc/40?img=3', preview: 'I am interested in the gaming chair', time: '3 hours ago', unread: false },
        { id: 4, sender: 'Sara Mostafa', avatar: 'https://i.pravatar.cc/40?img=9', preview: 'Can you lower the price?', time: 'yesterday', unread: false }
      ];

      const dropdown = document.createElement('div');
      dropdown.className = 'message-dropdown';
      dropdown.innerHTML = `
        <div class="dropdown-header">
          <h3>Messages</h3>
          <button class="mark-read-btn" id="markAllMessagesRead">Mark all as read</button>
        </div>
        <div class="notifications-list" id="messagesList"></div>
        <div class="dropdown-footer">
          <a href="messages.html" id="viewAllMessages">View all messages</a>
        </div>
      `;
      document.body.appendChild(dropdown);

      function renderMessages() {
        const listContainer = document.getElementById('messagesList');
        if (!listContainer) return;
        const unreadCount = conversations.filter(c => c.unread).length;
        messageBadge.textContent = unreadCount > 0 ? unreadCount : '';
        messageBadge.style.display = unreadCount > 0 ? 'block' : 'none';
        if (conversations.length === 0) {
          listContainer.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-secondary);">No messages</div>`;
          return;
        }
        listContainer.innerHTML = conversations.map(conv => `
          <div class="message-item" data-id="${conv.id}">
            <div class="message-avatar">
              <img src="${conv.avatar}" alt="${conv.sender}" onerror="this.src='https://i.pravatar.cc/40?u=${conv.sender}'">
            </div>
            <div class="message-content">
              <div class="message-sender">${conv.sender}</div>
              <div class="message-preview">${conv.preview}</div>
              <div class="message-time">${conv.time}</div>
            </div>
            ${conv.unread ? '<span class="message-unread-dot"></span>' : ''}
          </div>
        `).join('');
        document.querySelectorAll('.message-item').forEach(item => {
          item.addEventListener('click', function (e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const conv = conversations.find(c => c.id === id);
            if (conv && conv.unread) {
              conv.unread = false;
              renderMessages();
            }
            window.location.href = `chat.html?conversation=${id}`;
          });
        });
      }

      function markAllMessagesAsRead() {
        conversations.forEach(c => c.unread = false);
        renderMessages();
      }

      function toggleMessageDropdown(e) {
        e.stopPropagation();
        const rect = messageIcon.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + window.scrollY + 5) + 'px';
        dropdown.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px';
        dropdown.classList.toggle('show');
      }

      function closeMessageDropdown(e) {
        if (!dropdown.contains(e.target) && e.target !== messageIcon && !messageIcon.contains(e.target)) {
          dropdown.classList.remove('show');
        }
      }

      messageIcon.addEventListener('click', toggleMessageDropdown);
      document.addEventListener('click', closeMessageDropdown);
      document.getElementById('markAllMessagesRead')?.addEventListener('click', markAllMessagesAsRead);
      renderMessages();
    })();

    // ========== AI CHATBOT SCRIPT ==========
    const chatIcon = document.getElementById('chatIcon');
    const chatBox = document.getElementById('chatBox');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChat');

    if (chatIcon) {
      chatIcon.addEventListener('click', () => { chatBox.classList.toggle('show'); });

      function addMessage(text, isUser = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message' + (isUser ? '' : ' bot');
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      sendBtn.addEventListener('click', () => {
        const text = chatInput.value.trim();
        if (text === '') return;
        addMessage(text, true);
        chatInput.value = '';
        setTimeout(() => addMessage('Thanks! We\'ll reply soon. 😊'), 500);
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendBtn.click();
        }
      });

      document.addEventListener('click', (e) => {
        if (!chatBox.contains(e.target) && !chatIcon.contains(e.target)) {
          chatBox.classList.remove('show');
        }
      });
    }
  </script>
