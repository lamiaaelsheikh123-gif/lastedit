<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Phoenix · Product Details</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <style>
    /* ========== جميع الأنماط الأصلية محفوظة، ونضيف الأنماط الجديدة في نهاية الـ style ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg: #f9fafc;
      --surface: #ffffff;
      --text-primary: #1e1e2f;
      --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c;
      --accent-2: #ff6b2b;
      --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border: #eaeef2;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.05);
      --glow: rgba(255, 110, 64, 0.4);
      --navbar-bg: rgba(255, 255, 255, 0.8);
      --footer-bg: #1e1e2f;
      --footer-text: #f0f0fa;
      --special-gradient: linear-gradient(145deg, #000000, #ff6b2b, #ff8a4c, #ff4d4d);
    }

    body.dark {
      --bg: #12121a;
      --surface: #1e1e2a;
      --text-primary: #f0f0fa;
      --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e;
      --accent-2: #ff7b3f;
      --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border: #333344;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
      --glow: rgba(255, 140, 80, 0.6);
      --navbar-bg: rgba(30, 30, 42, 0.9);
      --footer-bg: #0b0b12;
      --footer-text: #ddddff;
      --special-gradient: linear-gradient(145deg, #111111, #ff7b3f, #ff9f6e, #ff5e5e);
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background-color 0.3s, color 0.2s;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 10% 30%, rgba(255, 140, 64, 0.03) 0%, transparent 25%),
        radial-gradient(circle at 90% 70%, rgba(255, 100, 100, 0.03) 0%, transparent 30%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
      position: relative;
      z-index: 1;
    }

    /* ========== NAVBAR ========== */
    nav {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .logo-area img {
      height: 40px;
      width: auto;
      border-radius: 8px;
    }

    .logo-text h2 {
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: block;
    }

    .nav-links {
      display: none;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1rem;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-1);
    }

    .nav-links .app-link {
      font-weight: 700;
      color: var(--accent-1);
      text-shadow: 0 0 5px var(--glow);
    }

    .app-link-mobile {
      font-weight: 700;
      color: var(--accent-1);
      font-size: 0.9rem;
      margin-left: auto;
      margin-right: 0.5rem;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      position: relative;
    }

    .nav-icon {
      font-size: 1.2rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-icon:hover {
      color: var(--accent-1);
      transform: scale(1.05);
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .profile-badge i {
      font-size: 1.2rem;
    }

    .profile-badge:hover {
      background: var(--accent-1);
      color: white;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: var(--accent-1);
      color: white;
      box-shadow: 0 0 15px var(--glow);
    }

    .hamburger {
      display: block;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      margin-left: 0.5rem;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 250px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1rem;
      transition: left 0.3s ease;
      z-index: 200;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar .close-btn {
      text-align: right;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 1.2rem;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1.1rem;
      display: block;
      padding: 0.5rem 0;
    }

    .sidebar a:hover {
      color: var(--accent-1);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* ===== Product Details Styles (original) ===== */
    .back-link {
      display: inline-block;
      margin: 1rem 0;
      color: var(--accent-1);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
    }

    .back-link i {
      margin-right: 0.3rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .product-wrapper {
      background: var(--surface);
      border-radius: 30px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    /* Image Gallery */
    .gallery-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .main-image {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .main-image:hover img {
      transform: scale(1.02);
    }

    .thumbnail-list {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: 0.2s;
      background: var(--bg);
    }

    .thumbnail:hover {
      transform: translateY(-2px);
    }

    .thumbnail.active {
      border-color: var(--accent-1);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Product Info */
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .product-info h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .product-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    .badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.3rem 1rem;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .badge i {
      color: var(--accent-1);
    }

    .condition-badge {
      background: var(--accent-1);
      color: white;
      border-radius: 40px;
      padding: 0.3rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-block;
    }

    .price-location {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      margin: 0.5rem 0;
    }

    .price {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-2);
    }

    .location {
      font-size: 1rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .description-section {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .description-section h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--accent-1);
    }

    .description-text {
      color: var(--text-secondary);
      line-height: 1.7;
      white-space: pre-line;
    }

    /* Seller Card */
    .seller-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: var(--shadow);
    }

    .seller-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--accent-1);
    }

    .seller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .seller-details {
      flex: 1;
    }

    .seller-details h4 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .seller-rating {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .seller-rating i {
      color: #ffb83b;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px var(--glow);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px var(--glow);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-outline:hover {
      background: var(--accent-1);
      color: white;
      box-shadow: 0 0 18px var(--glow);
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-btn:hover {
      background: var(--accent-1);
      color: white;
      border-color: var(--accent-1);
      transform: scale(1.05);
    }

    /* Related Items */
    .related-section {
      margin: 3rem 0;
    }

    .related-section h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 1.5rem;
    }

    .related-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1rem;
      transition: 0.2s;
      cursor: pointer;
    }

    .related-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-1);
    }

    .related-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 0.8rem;
    }

    .related-card h4 {
      font-size: 1rem;
      font-weight: 600;
    }

    .related-card .price {
      font-size: 1.2rem;
      color: var(--accent-2);
      font-weight: 700;
    }

    /* Chatbot (نسخة متطورة) */
    .chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chat-label {
      background: var(--surface);
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      cursor: default;
      text-decoration: underline 1px dotted var(--accent-1);
      text-underline-offset: 3px;
      transition: 0.2s;
    }

    .chat-label:hover {
      background: var(--accent-1);
      color: white;
      text-decoration: none;
    }

    .chat-circle {
      background: var(--gradient);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 8px 20px var(--glow);
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-circle:hover {
      transform: scale(1.1);
    }

    .chat-box {
      position: absolute;
      bottom: 70px;
      right: 0;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.2rem;
      display: none;
      box-shadow: var(--shadow);
    }

    .chat-box.show {
      display: block;
    }

    .chat-messages {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .chat-message {
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }

    .chat-message.bot {
      background: var(--accent-1);
      color: white;
    }

    .chat-box textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.7rem;
      color: var(--text-primary);
      resize: none;
      font-size: 0.9rem;
    }

    .chat-box button {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
    }

    /* ===== أنماط الإشعارات والرسائل الجديدة ===== */
    .notification-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent-1);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 50px;
      min-width: 18px;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      z-index: 5;
    }

    .notification-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 360px;
      max-width: 90vw;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .notification-dropdown.show {
      display: flex;
    }

    .dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .mark-read-btn {
      background: none;
      border: none;
      color: var(--accent-1);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .mark-read-btn:hover {
      text-decoration: underline;
    }

    .notifications-list {
      max-height: 400px;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .notification-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .notification-item:hover {
      background: var(--bg);
    }

    .notification-icon {
      font-size: 1.2rem;
      min-width: 32px;
      text-align: center;
      color: var(--accent-1);
    }

    .notification-content {
      flex: 1;
    }

    .notification-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }

    .notification-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.2rem;
    }

    .notification-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .unread-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-1);
      border-radius: 50%;
      position: absolute;
      right: 1rem;
      top: 1.2rem;
    }

    .dropdown-footer {
      padding: 0.8rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .dropdown-footer a {
      color: var(--accent-1);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .dropdown-footer a:hover {
      text-decoration: underline;
    }

    /* Message Dropdown */
    .message-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .message-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent-1);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 50px;
      min-width: 18px;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      z-index: 5;
    }

    .message-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 360px;
      max-width: 90vw;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 1000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .message-dropdown.show {
      display: flex;
    }

    .message-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .message-item:hover {
      background: var(--bg);
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--accent-1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message-content {
      flex: 1;
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }

    .message-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }

    .message-unread-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-1);
      border-radius: 50%;
      position: absolute;
      right: 1rem;
      top: 1.2rem;
    }

    /* Simple Footer (خلفية غامقة، رابط About فقط) */
    .simple-footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      margin-top: 3rem;
      border-top: 1px solid var(--border);
    }

    .simple-footer a {
      color: var(--footer-text);
      text-decoration: none;
      margin: 0 0.3rem;
      transition: 0.2s;
    }

    .simple-footer a:hover {
      color: var(--accent-1);
    }

    /* Responsive */
    @media (min-width: 768px) {
      .product-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      .related-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 767px) {
      .product-wrapper {
        display: flex;
        flex-direction: column;
      }

      .price-location {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn-primary,
      .btn-outline {
        width: 100%;
        justify-content: center;
      }

      .icon-btn {
        width: 100%;
        border-radius: 60px;
      }
    }

    @media (max-width: 600px) {
      .thumbnail {
        width: 60px;
        height: 60px;
      }
    }

    @media (max-width: 480px) {

      .notification-dropdown,
      .message-dropdown {
        right: -10px;
        width: calc(100vw - 20px);
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="logo-area">
      <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
      <div class="logo-text">
        <h2>Phoenix</h2>
        <span>donate & trade</span>
      </div>
    </div>
    <a href="#app" class="app-link-mobile">App</a>
    <div class="nav-links">
      <a href="dashboard.html">Home</a>
      <a href="market.html">Market</a>
      <a href="donate.html">Donate</a>
      <a href="sell.html">Sell</a>
      <a href="#app" class="app-link">App</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <!-- Notification Bell with wrapper and badge -->
      <div class="notification-wrapper">
        <i class="fas fa-bell nav-icon" id="notificationBell"></i>
        <span class="notification-badge" id="notificationBadge">3</span>
      </div>
      <!-- Message Icon with wrapper and badge -->
      <div class="message-wrapper">
        <i class="fas fa-comment-dots nav-icon" id="messageIcon"></i>
        <span class="message-badge" id="messageBadge">2</span>
      </div>
      <a href="profile.html" class="profile-badge">
        <i class="fas fa-user"></i>
      </a>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <span class="hamburger" id="hamburger">☰</span>
    </div>
  </nav>

  <div class="sidebar" id="sidebar">
    <div class="close-btn" id="closeSidebar">✕</div>
    <ul>
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="market.html">Market</a></li>
      <li><a href="donate.html">Donate</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="#app">App</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" id="logoutSidebar">Logout</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <main class="container">
    <a href="#" class="back-link" id="backBtn"><i class="fas fa-arrow-left"></i> Back</a>

    <div id="productDetails" class="product-wrapper">
      <!-- سيتم تعبئتها ديناميكياً -->
    </div>

    <!-- Related Items Section -->
    <div class="related-section" id="relatedSection">
      <h2>You may also like</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

    <div id="app" style="scroll-margin-top:70px;"></div>
  </main>

  <!-- Simple Footer (خلفية غامقة، رابط About فقط) -->
  <footer class="simple-footer">
    <div>© 2025 Phoenix • <a href="#">About</a></div>
  </footer>

  <!-- Chatbot -->
  <div class="chatbot">
    <span class="chat-label">Ask AI</span>
    <div class="chat-circle" id="chatIcon"><i class="fas fa-robot"></i></div>
    <div class="chat-box" id="chatBox">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message bot">👋 Hi! How can I help you today?</div>
      </div>
      <textarea id="chatInput" placeholder="Type your message..." rows="2"></textarea>
      <button id="sendChat">Send</button>
    </div>
  </div>

  <script>
    // ========== بيانات افتراضية (dummy) للمنتج ==========
    const productData = {
      id: 1,
      title: 'MacBook Pro 16" M3 Max',
      price: 2499,
      currency: 'USD',
      description: 'Brand new MacBook Pro with M3 Max chip, 32GB RAM, 1TB SSD. Includes original box and charger. Used for only 2 months, in perfect condition.',
      images: [
        'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/mbp16-spacegray-select-202301?wid=904&hei=840&fmt=jpeg&qlt=90&.v=1671304673202',
        'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/mbp16-spacegray-gallery1-202301?wid=904&hei=840&fmt=jpeg&qlt=90&.v=1671304673226',
        'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/mbp16-spacegray-gallery2-202301?wid=904&hei=840&fmt=jpeg&qlt=90&.v=1671304672706',
        'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/mbp16-spacegray-gallery3-202301?wid=904&hei=840&fmt=jpeg&qlt=90&.v=1671304672948'
      ],
      category: 'Electronics',
      condition: 'Like New',
      location: 'Cairo, Egypt',
      seller: {
        name: 'Ahmed Hassan',
        avatar: 'https://i.pravatar.cc/150?img=7',
        rating: 4.8,
        reviews: 120
      },
      posted: '2 days ago'
    };

    // ========== بيانات المنتجات المشابهة (related) ==========
    const relatedProducts = [
      { id: 2, title: 'Sony WH-1000XM5', price: 299, image: 'https://m.media-amazon.com/images/I/61+btxzpfDL._AC_SL1500_.jpg' },
      { id: 3, title: 'iPad Pro 12.9"', price: 1099, image: 'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/ipad-pro-12-select-wifi-spacegray-202104?wid=940&hei=1112&fmt=png-alpha&.v=1617126617000' },
      { id: 4, title: 'Gaming Chair', price: 399, image: 'https://m.media-amazon.com/images/I/71jG+e7fDXL._AC_SL1500_.jpg' },
      { id: 5, title: 'Canon EOS R6 II', price: 2199, image: 'https://m.media-amazon.com/images/I/71h1nFqy8HL._AC_SL1500_.jpg' }
    ];

    // ========== عرض تفاصيل المنتج ==========
    const container = document.getElementById('productDetails');
    let currentMainImage = productData.images[0];

    function renderProduct() {
      const thumbsHtml = productData.images.map((img, index) => `
                <div class="thumbnail ${index === 0 ? 'active' : ''}" data-img="${img}">
                    <img src="${img}" alt="thumbnail" onerror="this.src='https://via.placeholder.com/80'">
                </div>
            `).join('');

      const priceDisplay = productData.price === 0 ? 'Free' : `${productData.currency === 'EGP' ? 'EGP' : '$'}${productData.price}`;

      container.innerHTML = `
                <div class="gallery-container">
                    <div class="main-image" id="mainImage">
                        <img src="${productData.images[0]}" alt="${productData.title}" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
                    </div>
                    <div class="thumbnail-list" id="thumbnailList">
                        ${thumbsHtml}
                    </div>
                </div>
                <div class="product-info">
                    <h1>${productData.title}</h1>
                    <div class="product-meta">
                        <span class="badge"><i class="fas fa-tag"></i> ${productData.category}</span>
                        <span class="badge"><i class="fas fa-calendar-alt"></i> ${productData.posted}</span>
                        <span class="condition-badge">${productData.condition}</span>
                    </div>
                    <div class="price-location">
                        <span class="price">${priceDisplay}</span>
                        <span class="location"><i class="fas fa-map-marker-alt"></i> ${productData.location}</span>
                    </div>
                    <div class="description-section">
                        <h3>Product Description</h3>
                        <div class="description-text">${productData.description}</div>
                    </div>
                    
                    <!-- Seller Card -->
                    <div class="seller-card">
                        <div class="seller-avatar">
                            <img src="${productData.seller.avatar}" alt="${productData.seller.name}">
                        </div>
                        <div class="seller-details">
                            <h4>${productData.seller.name}</h4>
                            <div class="seller-rating">
                                <span><i class="fas fa-star"></i> ${productData.seller.rating}</span>
                                <span>(${productData.seller.reviews} reviews)</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button class="btn-primary" id="chatBtn"><i class="fas fa-comment"></i> Chat with Seller</button>
                        <button class="btn-outline" id="offerBtn"><i class="fas fa-hand-holding-usd"></i> Make Offer</button>
                        <button class="icon-btn" id="saveBtn" title="Save"><i class="far fa-heart"></i></button>
                        <button class="icon-btn" id="shareBtn" title="Share"><i class="fas fa-share-alt"></i></button>
                    </div>
                </div>
            `;

      // معرض الصور
      document.querySelectorAll('.thumbnail').forEach(thumb => {
        thumb.addEventListener('click', function () {
          const imgSrc = this.dataset.img;
          document.getElementById('mainImage').innerHTML = `<img src="${imgSrc}" alt="${productData.title}" onerror="this.src='https://via.placeholder.com/600x400'">`;
          document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });

      // أزرار التفاعل
      document.getElementById('chatBtn').addEventListener('click', () => {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
          window.location.href = 'sign.html';
          return;
        }
        // حفظ معلومات البائع للشات
        localStorage.setItem('chatWith', JSON.stringify({
          id: productData.id,
          name: productData.seller.name,
          avatar: productData.seller.avatar,
          productTitle: productData.title
        }));
        window.location.href = 'chat.html';
      });

      document.getElementById('offerBtn').addEventListener('click', () => {
        alert('Offer feature coming soon!');
      });

      document.getElementById('saveBtn').addEventListener('click', function () {
        const icon = this.querySelector('i');
        icon.classList.toggle('far');
        icon.classList.toggle('fas');
        // هنا يمكن إضافة منطق المفضلة
      });

      document.getElementById('shareBtn').addEventListener('click', () => {
        navigator.clipboard?.writeText(window.location.href).then(() => {
          alert('Link copied to clipboard!');
        }).catch(() => {
          prompt('Copy this link:', window.location.href);
        });
      });
    }

    renderProduct();

    // ========== عرض المنتجات المشابهة ==========
    const relatedGrid = document.getElementById('relatedGrid');
    relatedGrid.innerHTML = relatedProducts.map(p => `
            <div class="related-card" data-id="${p.id}">
                <img src="${p.image}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/200'">
                <h4>${p.title}</h4>
                <div class="price">$${p.price}</div>
            </div>
        `).join('');

    document.querySelectorAll('.related-card').forEach(card => {
      card.addEventListener('click', function () {
        const id = this.dataset.id;
        // يمكن التوجيه إلى نفس الصفحة بمنتج مختلف
        alert('View product ' + id); // للتجربة
      });
    });

    // ========== الوضع الداكن ==========
    const toggle = document.getElementById('themeToggle');
    const icon = toggle.querySelector('i');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      icon.classList.toggle('fa-sun');
      icon.classList.toggle('fa-moon');
    });

    // ========== القائمة الجانبية ==========
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeSidebar');

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    hamburger.addEventListener('click', openSidebar);
    closeBtn.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    // ========== التمرير السلس للروابط الداخلية ==========
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        if (targetId && targetId !== '#') {
          const targetEl = document.querySelector(targetId);
          if (targetEl) {
            const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 70;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }
        }
        closeSidebar();
      });
    });

    // ========== تسجيل الخروج ==========
    function handleLogout() {
      const confirmLogout = confirm('Are you sure you want to logout?');
      if (confirmLogout) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('selectedProduct');
        window.location.href = 'index.html';
      }
    }
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('logoutSidebar').addEventListener('click', (e) => {
      e.preventDefault();
      handleLogout();
    });

    // ========== زر العودة ==========
    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.history.back();
    });

    // ========== Chatbot (مستقل) ==========
    const chatIcon = document.getElementById('chatIcon');
    const chatBox = document.getElementById('chatBox');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChat');

    chatIcon.addEventListener('click', () => { chatBox.classList.toggle('show'); });

    function addMessage(text, isUser = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'chat-message' + (isUser ? '' : ' bot');
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (text === '') return;
      addMessage(text, true);
      chatInput.value = '';
      setTimeout(() => addMessage('Thanks! We\'ll reply soon. 😊'), 500);
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
    });

    document.addEventListener('click', (e) => {
      if (!chatBox.contains(e.target) && !chatIcon.contains(e.target)) chatBox.classList.remove('show');
    });

    // ========== NOTIFICATION DROPDOWN SCRIPT ==========
    (function () {
      const bell = document.getElementById('notificationBell');
      const badge = document.getElementById('notificationBadge');
      if (!bell) return;
      let notifications = [
        { id: 1, type: 'message', title: 'New message', description: 'Ahmed sent you a message about MacBook', time: '2 min ago', unread: true },
        { id: 2, type: 'donation', title: 'Donation request', description: 'Someone wants your winter coat', time: '1 hour ago', unread: true },
        { id: 3, type: 'system', title: 'Price update', description: 'Your listing price was changed', time: '3 hours ago', unread: true },
        { id: 4, type: 'message', title: 'New offer', description: 'Received an offer for iPhone', time: 'yesterday', unread: false }
      ];
      function getIconClass(type) {
        switch (type) { case 'message': return 'fa-envelope'; case 'donation': return 'fa-heart'; case 'system': return 'fa-exclamation-triangle'; default: return 'fa-bell'; }
      }
      const dropdown = document.createElement('div');
      dropdown.className = 'notification-dropdown';
      dropdown.innerHTML = `
        <div class="dropdown-header"><h3>Notifications</h3><button class="mark-read-btn" id="markAllRead">Mark all as read</button></div>
        <div class="notifications-list" id="notificationsList"></div>
        <div class="dropdown-footer"><a href="notifications.html">View all notifications</a></div>
      `;
      document.body.appendChild(dropdown);
      function renderNotifications() {
        const listContainer = document.getElementById('notificationsList');
        if (!listContainer) return;
        const unreadCount = notifications.filter(n => n.unread).length;
        badge.textContent = unreadCount > 0 ? unreadCount : '';
        badge.style.display = unreadCount > 0 ? 'block' : 'none';
        if (notifications.length === 0) { listContainer.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-secondary);">No notifications</div>`; return; }
        listContainer.innerHTML = notifications.map(notif => `
          <div class="notification-item" data-id="${notif.id}">
            <div class="notification-icon"><i class="fas ${getIconClass(notif.type)}"></i></div>
            <div class="notification-content">
              <div class="notification-title">${notif.title}</div>
              <div class="notification-desc">${notif.description}</div>
              <div class="notification-time">${notif.time}</div>
            </div>
            ${notif.unread ? '<span class="unread-dot"></span>' : ''}
          </div>
        `).join('');
        document.querySelectorAll('.notification-item').forEach(item => {
          item.addEventListener('click', function (e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const notif = notifications.find(n => n.id === id);
            if (notif && notif.unread) { notif.unread = false; renderNotifications(); }
          });
        });
      }
      function markAllAsRead() { notifications.forEach(n => n.unread = false); renderNotifications(); }
      function toggleDropdown(e) {
        e.stopPropagation();
        const rect = bell.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + window.scrollY + 5) + 'px';
        dropdown.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px';
        dropdown.classList.toggle('show');
      }
      function closeDropdown(e) { if (!dropdown.contains(e.target) && e.target !== bell && !bell.contains(e.target)) dropdown.classList.remove('show'); }
      bell.addEventListener('click', toggleDropdown);
      document.addEventListener('click', closeDropdown);
      document.getElementById('markAllRead')?.addEventListener('click', markAllAsRead);
      renderNotifications();
    })();

    // ========== MESSAGE DROPDOWN SCRIPT ==========
    (function () {
      const messageIcon = document.getElementById('messageIcon');
      const messageBadge = document.getElementById('messageBadge');
      if (!messageIcon) return;
      let conversations = [
        { id: 1, sender: 'Ahmed Hassan', avatar: 'https://i.pravatar.cc/40?img=7', preview: 'Hey, is the MacBook still available?', time: '2 min ago', unread: true },
        { id: 2, sender: 'Lamiaa Elsheikh', avatar: 'https://i.pravatar.cc/40?img=5', preview: 'Thanks for the donation!', time: '1 hour ago', unread: true },
        { id: 3, sender: 'Mohamed Ali', avatar: 'https://i.pravatar.cc/40?img=3', preview: 'I am interested in the gaming chair', time: '3 hours ago', unread: false },
        { id: 4, sender: 'Sara Mostafa', avatar: 'https://i.pravatar.cc/40?img=9', preview: 'Can you lower the price?', time: 'yesterday', unread: false }
      ];
      const dropdown = document.createElement('div');
      dropdown.className = 'message-dropdown';
      dropdown.innerHTML = `
        <div class="dropdown-header"><h3>Messages</h3><button class="mark-read-btn" id="markAllMessagesRead">Mark all as read</button></div>
        <div class="notifications-list" id="messagesList"></div>
        <div class="dropdown-footer"><a href="messages.html">View all messages</a></div>
      `;
      document.body.appendChild(dropdown);
      function renderMessages() {
        const listContainer = document.getElementById('messagesList');
        if (!listContainer) return;
        const unreadCount = conversations.filter(c => c.unread).length;
        messageBadge.textContent = unreadCount > 0 ? unreadCount : '';
        messageBadge.style.display = unreadCount > 0 ? 'block' : 'none';
        if (conversations.length === 0) { listContainer.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-secondary);">No messages</div>`; return; }
        listContainer.innerHTML = conversations.map(conv => `
          <div class="message-item" data-id="${conv.id}">
            <div class="message-avatar"><img src="${conv.avatar}" alt="${conv.sender}" onerror="this.src='https://i.pravatar.cc/40?u=${conv.sender}'"></div>
            <div class="message-content">
              <div class="message-sender">${conv.sender}</div>
              <div class="message-preview">${conv.preview}</div>
              <div class="message-time">${conv.time}</div>
            </div>
            ${conv.unread ? '<span class="message-unread-dot"></span>' : ''}
          </div>
        `).join('');
        document.querySelectorAll('.message-item').forEach(item => {
          item.addEventListener('click', function (e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const conv = conversations.find(c => c.id === id);
            if (conv && conv.unread) { conv.unread = false; renderMessages(); }
            window.location.href = `chat.html?conversation=${id}`;
          });
        });
      }
      function markAllMessagesAsRead() { conversations.forEach(c => c.unread = false); renderMessages(); }
      function toggleMessageDropdown(e) {
        e.stopPropagation();
        const rect = messageIcon.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + window.scrollY + 5) + 'px';
        dropdown.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px';
        dropdown.classList.toggle('show');
      }
      function closeMessageDropdown(e) { if (!dropdown.contains(e.target) && e.target !== messageIcon && !messageIcon.contains(e.target)) dropdown.classList.remove('show'); }
      messageIcon.addEventListener('click', toggleMessageDropdown);
      document.addEventListener('click', closeMessageDropdown);
      document.getElementById('markAllMessagesRead')?.addEventListener('click', markAllMessagesAsRead);
      renderMessages();
    })();
  </script>
</body>

</html>
