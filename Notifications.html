<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Phoenix · Notifications</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <style>
    /* ========== EXACT SAME DESIGN SYSTEM AS MARKET.HTML ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg: #f9fafc;
      --surface: #ffffff;
      --text-primary: #1e1e2f;
      --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c;
      --accent-2: #ff6b2b;
      --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --card-bg: #ffffff;
      --border: #eaeef2;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.05);
      --glow: rgba(255, 110, 64, 0.4);
      --navbar-bg: rgba(255, 255, 255, 0.8);
      --footer-bg: #1e1e2f;
      --footer-text: #f0f0fa;
      --special-gradient: linear-gradient(145deg, #000000, #ff6b2b, #ff8a4c, #ff4d4d);
    }

    body.dark {
      --bg: #12121a;
      --surface: #1e1e2a;
      --text-primary: #f0f0fa;
      --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e;
      --accent-2: #ff7b3f;
      --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --card-bg: #252533;
      --border: #333344;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
      --glow: rgba(255, 140, 80, 0.6);
      --navbar-bg: rgba(30, 30, 42, 0.9);
      --footer-bg: #0b0b12;
      --footer-text: #ddddff;
      --special-gradient: linear-gradient(145deg, #111111, #ff7b3f, #ff9f6e, #ff5e5e);
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      transition: 0.3s;
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ===== NAVBAR (EXACT COPY FROM MARKET.HTML) ===== */
    nav {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .logo-area img {
      height: 40px;
      width: auto;
      border-radius: 8px;
    }

    .logo-text h2 {
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: block;
    }

    .nav-links {
      display: none;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1rem;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-1);
    }

    .nav-links .app-link {
      font-weight: 700;
      color: var(--accent-1);
      text-shadow: 0 0 5px var(--glow);
    }

    .app-link-mobile {
      font-weight: 700;
      color: var(--accent-1);
      font-size: 0.9rem;
      margin-left: auto;
      margin-right: 0.5rem;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-icon {
      font-size: 1.2rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-icon:hover {
      color: var(--accent-1);
      transform: scale(1.05);
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
    }

    .profile-badge i {
      font-size: 1.2rem;
    }

    .profile-badge:hover {
      background: var(--accent-1);
      color: white;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: var(--accent-1);
      color: white;
      box-shadow: 0 0 15px var(--glow);
    }

    .hamburger {
      display: block;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      margin-left: 0.5rem;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 250px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1rem;
      transition: left 0.3s ease;
      z-index: 200;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar .close-btn {
      text-align: right;
      margin-bottom: 2rem;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      margin-bottom: 1.2rem;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1.1rem;
      display: block;
      padding: 0.5rem 0;
    }

    .sidebar a:hover {
      color: var(--accent-1);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* ===== NOTIFICATIONS PAGE SPECIFIC STYLES ===== */
    .page-header {
      margin: 2rem 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: var(--special-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .mark-read-btn {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px var(--glow);
    }

    .mark-read-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px var(--glow);
    }

    /* Notifications list - same card style as product cards */
    .notifications-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0 3rem;
    }

    .notification-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid var(--border);
      transition: 0.2s;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
    }

    .notification-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-1);
    }

    .notification-icon {
      font-size: 1.5rem;
      min-width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-radius: 50%;
      color: var(--accent-1);
    }

    .notification-content {
      flex: 1;
    }

    .notification-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .notification-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.2rem;
    }

    .notification-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      background: var(--accent-1);
      border-radius: 50%;
      position: absolute;
      right: 1rem;
      top: 1.2rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      background: var(--card-bg);
      border-radius: 30px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ===== AI Chatbot Styles ===== */
    .chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chat-label {
      background: var(--surface);
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      cursor: default;
      text-decoration: underline 1px dotted var(--accent-1);
      text-underline-offset: 3px;
      transition: 0.2s;
    }

    .chat-label:hover {
      background: var(--accent-1);
      color: white;
      text-decoration: none;
    }

    .chat-circle {
      background: var(--gradient);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 8px 20px var(--glow);
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-circle:hover {
      transform: scale(1.1);
    }

    .chat-box {
      position: absolute;
      bottom: 70px;
      right: 0;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.2rem;
      display: none;
      box-shadow: var(--shadow);
    }

    .chat-box.show {
      display: block;
    }

    .chat-messages {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .chat-message {
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }

    .chat-message.bot {
      background: var(--accent-1);
      color: white;
    }

    .chat-box textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.7rem;
      color: var(--text-primary);
      resize: none;
      font-size: 0.9rem;
    }

    .chat-box button {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .container {
        padding: 0 2rem;
      }

      nav {
        padding: 0.8rem 2rem;
      }

      .logo-area img {
        height: 52px;
      }

      .logo-text h2 {
        font-size: 1.5rem;
      }

      .logo-text span {
        font-size: 0.8rem;
      }

      .nav-links {
        display: flex;
      }

      .app-link-mobile {
        display: none;
      }

      .hamburger {
        display: none;
      }

      .sidebar,
      .overlay {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .notification-card {
        padding: 0.8rem;
      }

      .notification-icon {
        min-width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .unread-dot {
        right: 0.8rem;
        top: 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- EXACT SAME NAVBAR AS MARKET.HTML -->
  <nav>
    <div class="logo-area">
      <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
      <div class="logo-text">
        <h2>Phoenix</h2>
        <span>donate & trade</span>
      </div>
    </div>
    <a href="#app" class="app-link-mobile">App</a>
    <div class="nav-links">
      <a href="dashboard.html">Home</a>
      <a href="market.html">Market</a>
      <a href="donate.html">Donate</a>
      <a href="sell.html">Sell</a>
      <a href="#app" class="app-link">App</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <i class="fas fa-bell nav-icon"></i>
      <i class="fas fa-comment-dots nav-icon"></i>
      <a href="profile.html" class="profile-badge">
        <i class="fas fa-user"></i>
      </a>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <span class="hamburger" id="hamburger">☰</span>
    </div>
  </nav>

  <div class="sidebar" id="sidebar">
    <div class="close-btn" id="closeSidebar">✕</div>
    <ul>
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="market.html">Market</a></li>
      <li><a href="donate.html">Donate</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="#app">App</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" id="logoutSidebar">Logout</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>

  <main class="container">
    <div class="page-header">
      <h1>All Notifications</h1>
      <button class="mark-read-btn" id="markAllReadBtn">Mark all as read</button>
    </div>

    <!-- Notifications will be injected here -->
    <div id="notificationsContainer" class="notifications-list"></div>

    <div id="app" style="scroll-margin-top:70px;"></div>
  </main>

  <!-- AI Chatbot -->
  <div class="chatbot">
    <span class="chat-label">Ask AI</span>
    <div class="chat-circle" id="chatIcon"><i class="fas fa-robot"></i></div>
    <div class="chat-box" id="chatBox">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message bot">👋 Hi! How can I help you today?</div>
      </div>
      <textarea id="chatInput" placeholder="Type your message..." rows="2"></textarea>
      <button id="sendChat">Send</button>
    </div>
  </div>

  <script>
    // ========== SAMPLE NOTIFICATIONS DATA ==========
    let notifications = [
      { id: 1, type: 'message', title: 'New message', description: 'Ahmed sent you a message about MacBook', time: '2 min ago', unread: true },
      { id: 2, type: 'donation', title: 'Donation request', description: 'Someone wants your winter coat', time: '1 hour ago', unread: true },
      { id: 3, type: 'system', title: 'Price update', description: 'Your listing price was changed', time: '3 hours ago', unread: true },
      { id: 4, type: 'message', title: 'New offer', description: 'Received an offer for iPhone', time: 'yesterday', unread: false }
    ];

    // Helper to get icon class based on type
    function getIconClass(type) {
      switch (type) {
        case 'message': return 'fa-envelope';
        case 'donation': return 'fa-heart';
        case 'system': return 'fa-exclamation-triangle';
        default: return 'fa-bell';
      }
    }

    // Render notifications
    const container = document.getElementById('notificationsContainer');
    function renderNotifications() {
      if (!notifications.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash" style="font-size: 2rem; margin-bottom: 0.5rem; display: block;"></i>No notifications yet</div>`;
        return;
      }

      container.innerHTML = notifications.map(notif => `
        <div class="notification-card" data-id="${notif.id}">
          <div class="notification-icon">
            <i class="fas ${getIconClass(notif.type)}"></i>
          </div>
          <div class="notification-content">
            <div class="notification-title">${notif.title}</div>
            <div class="notification-desc">${notif.description}</div>
            <div class="notification-time">${notif.time}</div>
          </div>
          ${notif.unread ? '<span class="unread-dot"></span>' : ''}
        </div>
      `).join('');

      // Add click event to each notification to remove unread dot
      document.querySelectorAll('.notification-card').forEach(card => {
        card.addEventListener('click', function (e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          const notif = notifications.find(n => n.id === id);
          if (notif && notif.unread) {
            notif.unread = false;
            renderNotifications();
          }
        });
      });
    }

    // Mark all as read
    function markAllAsRead() {
      notifications.forEach(n => n.unread = false);
      renderNotifications();
    }

    // Event listeners
    document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);

    // Initial render
    renderNotifications();

    // ========== DARK MODE (same as marketplace) ==========
    const toggle = document.getElementById('themeToggle');
    const icon = toggle.querySelector('i');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      icon.classList.toggle('fa-sun');
      icon.classList.toggle('fa-moon');
    });

    // ========== SIDEBAR (same as marketplace) ==========
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeSidebar');

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    hamburger.addEventListener('click', openSidebar);
    closeBtn.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        if (targetId && targetId !== '#') {
          const targetEl = document.querySelector(targetId);
          if (targetEl) {
            const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 70;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }
        }
        closeSidebar();
      });
    });

    // Logout
    function handleLogout() {
      const confirmLogout = confirm('Are you sure you want to logout?');
      if (confirmLogout) {
        window.location.href = 'index.html';
      }
    }
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('logoutSidebar').addEventListener('click', (e) => {
      e.preventDefault();
      handleLogout();
    });

    // ========== AI CHATBOT SCRIPT ==========
    const chatIcon = document.getElementById('chatIcon');
    const chatBox = document.getElementById('chatBox');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChat');

    if (chatIcon) {
      chatIcon.addEventListener('click', () => { chatBox.classList.toggle('show'); });

      function addMessage(text, isUser = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message' + (isUser ? '' : ' bot');
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      sendBtn.addEventListener('click', () => {
        const text = chatInput.value.trim();
        if (text === '') return;
        addMessage(text, true);
        chatInput.value = '';
        setTimeout(() => addMessage('Thanks! We\'ll reply soon. 😊'), 500);
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendBtn.click();
        }
      });

      document.addEventListener('click', (e) => {
        if (!chatBox.contains(e.target) && !chatIcon.contains(e.target)) {
          chatBox.classList.remove('show');
        }
      });
    }
  </script>
</body>

</html>
