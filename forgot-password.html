<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Phoenix · Forgot Password</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg: #f9fafc;
            --surface: #ffffff;
            --text-primary: #1e1e2f;
            --text-secondary: #4a4a5e;
            --accent-1: #ff8a4c;
            --accent-2: #ff6b2b;
            --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
            --border: #eaeef2;
            --shadow: 0 20px 30px -10px rgba(0,0,0,0.05);
            --glow: rgba(255,110,64,0.4);
            --input-bg: #ffffff;
            --card-bg: #ffffff;
            --navbar-bg: rgba(255,255,255,0.8);
        }
        body.dark {
            --bg: #12121a;
            --surface: #1e1e2a;
            --text-primary: #f0f0fa;
            --text-secondary: #b0b0c0;
            --accent-1: #ff9f6e;
            --accent-2: #ff7b3f;
            --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
            --border: #333344;
            --shadow: 0 20px 30px -10px rgba(0,0,0,0.7);
            --glow: rgba(255,140,80,0.6);
            --input-bg: #252533;
            --card-bg: #1e1e2a;
            --navbar-bg: rgba(30,30,42,0.9);
        }
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
            background-image: radial-gradient(circle at 10% 30%, rgba(255,140,64,0.03) 0%, transparent 25%),
                              radial-gradient(circle at 90% 70%, rgba(255,100,100,0.03) 0%, transparent 30%);
            pointer-events: none; z-index: -1;
        }

        .nav-mini {
            display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem;
            background: var(--navbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        }
        .nav-mini .logo-area { display: flex; align-items: center; gap: 0.5rem; }
        .nav-mini .logo-area img { height: 52px; width: auto; border-radius: 12px; }
        .nav-mini .logo-text h2 {
            font-size: 1.5rem; font-weight: 700; background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-mini .logo-text span { font-size: 0.8rem; color: var(--text-secondary); }
        .nav-mini .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; }

        .container {
            display: flex; flex: 1; align-items: center; justify-content: center; padding: 2rem;
        }
        .card {
            max-width: 480px; width: 100%; background: var(--card-bg); border-radius: 48px;
            box-shadow: var(--shadow); border: 1px solid var(--border); padding: 2.5rem 2rem;
            backdrop-filter: blur(4px);
        }
        .card h3 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card .subhead { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); font-size: 0.95rem; }
        .input-group input {
            width: 100%; padding: 0.9rem 1.2rem; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 60px; font-size: 1rem; color: var(--text-primary); transition: 0.2s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--accent-1); box-shadow: 0 0 0 3px var(--glow);
        }
        .btn-primary {
            width: 100%; background: var(--gradient); color: white; border: none; padding: 0.9rem;
            border-radius: 60px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: 0.25s; box-shadow: 0 4px 14px var(--glow); margin-bottom: 1.5rem;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 25px var(--glow); }
        .back-link { text-align: center; color: var(--text-secondary); }
        .back-link a { color: var(--accent-1); font-weight: 500; text-decoration: none; }
        .footer-note { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary); }
        .message {
            background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 1rem;
            margin-top: 1rem; text-align: center; color: var(--accent-1); display: none;
        }
        .message.show { display: block; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .card { padding: 1.8rem 1.2rem; }
            .nav-mini { padding: 0.8rem 1rem; }
            .nav-mini .logo-area img { height: 44px; }
            .nav-mini .logo-text h2 { font-size: 1.3rem; }
            .nav-mini .logo-text span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="nav-mini">
        <div class="logo-area">
            <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
            <div class="logo-text">
                <h2>Phoenix</h2>
                <span>donate & trade</span>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <div class="container">
        <div class="card">
            <h3>Forgotten Password?</h3>
            <div class="subhead">Enter your email and we'll send you a reset link.</div>

            <form id="forgotForm" onsubmit="handleForgot(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="hello@phoenix.exchange" required autocomplete="email">
                </div>
                <button type="submit" class="btn-primary">Send Reset Link</button>
                <div class="message" id="message">If an account exists with this email, you'll receive a reset link. Redirecting...</div>
            </form>

            <div class="back-link">
                <a href="sign.html">← Back to Sign In</a>
            </div>
            <div class="footer-note">Phoenix Exchange System © 2026</div>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('themeToggle');
        const icon = toggle.querySelector('i');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
            }
        });

        function handleForgot(e) {
            e.preventDefault(); // Prevent default form submission

            // Get email and convert to lowercase for case-insensitive comparison
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) return; // Should not happen because of required, but just in case

            // Retrieve users array from localStorage (default to empty array)
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Check if any user has the same email (case-insensitive already handled)
            const userExists = users.some(user => user.email.toLowerCase() === email);

            // For security, we always show the same success message regardless of existence
            const msg = document.getElementById('message');
            msg.classList.add('show');

            // Disable the submit button to prevent multiple submissions
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.style.opacity = 0.6;

            // If the email exists, save it in localStorage under "resetEmail" for later use (e.g., in reset-password page)
            if (userExists) {
                localStorage.setItem('resetEmail', email);
            } else {
                // Optionally clear any previous resetEmail, but we can just not set it
                localStorage.removeItem('resetEmail');
            }

            // After 2 seconds, redirect to reset-password.html (simulating the reset link process)
            setTimeout(() => {
                window.location.href = 'reset-password.html';
            }, 2000);
        }
    </script>
</body>
</html>
